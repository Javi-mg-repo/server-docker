services:
  mc:
    image: itzg/minecraft-server
    container_name: mc-server
    ports:
      - "25565:25565"
    environment:
      EULA: "TRUE"
      TYPE: "PAPER"
      MEMORY: "2G"
    volumes:
      - ./data:/data
    restart: unless-stopped

  panel-control:
    image: portainer/portainer-ce:latest
    container_name: portainer
    ports:
      - "9443:9443"
      - "9000:9000"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - portainer_data:/data
    restart: always

  backups:
    image: itzg/mc-backup
    container_name: mc-backups
    environment:
      BACKUP_INTERVAL: "24h"
      INITIAL_DELAY: "2m"
      PRUNE_BACKUPS_DAYS: "7"
    volumes:
      - ./data:/data:ro
      - ./backups:/backups
    restart: unless-stopped

volumes:
  portainer_data: